<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhySoc · University of Leeds Physics Society</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Baloo+2:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--forest:#2E7D32;--forest-d:#1B5E20;--pine:#0F3322;--lime:#BFF36A;--leaf:#8BC34A;--mint:#5AD1A0;--teal:#19B89A;--ink:#07140E;--paper:#FAFAFA;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:#07140E;-webkit-text-size-adjust:100%;}
  body{background:var(--ink);color:var(--paper);font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;justify-content:center;padding:0 24px 64px;position:relative;overflow-x:hidden;}
  .traces{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .traces svg{width:100%;height:100%;display:block;}
  .trace-line{fill:none;stroke-linecap:round;}
  .tracer{fill:none;stroke-linecap:round;}
  .glow{position:fixed;left:50%;top:-10vmax;width:90vmax;height:90vmax;transform:translateX(-50%);background:radial-gradient(circle,var(--pine) 0%,transparent 60%);opacity:.6;z-index:0;pointer-events:none;}
  .corner{position:fixed;z-index:3;}
  .corner.tl{top:0;left:0;width:84px;height:11px;background:var(--forest);}
  .corner.tl::after{content:"";position:absolute;top:0;left:0;width:11px;height:84px;background:var(--forest);}
  .corner.br{bottom:0;right:0;width:84px;height:11px;background:var(--lime);}
  .corner.br::after{content:"";position:absolute;bottom:0;right:0;width:11px;height:84px;background:var(--lime);}
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;z-index:2;padding-top:54px;}
  .hero{width:150px;height:150px;margin-bottom:22px;}
  .spin-cw{animation:spin 18s linear infinite;transform-origin:120px 120px;}
  .spin-ccw{animation:spin 22s linear infinite reverse;transform-origin:120px 120px;}
  .spin-cw2{animation:spin 14s linear infinite;transform-origin:120px 120px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .wordmark{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:54px;letter-spacing:-2px;line-height:1;margin-bottom:10px;text-shadow:0 2px 20px rgba(7,20,14,.9);}
  .wordmark .phy{color:var(--paper);}.wordmark .s{color:var(--lime);}.wordmark .oc{color:var(--lime);}.wordmark .dot{color:var(--mint);}
  .tagline{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mint);margin-bottom:36px;text-align:center;}
  .links{width:100%;display:flex;flex-direction:column;gap:13px;}
  .link{display:flex;align-items:center;gap:14px;padding:17px 18px;border-radius:14px;text-decoration:none;font-size:15px;font-weight:500;letter-spacing:.3px;border:1.5px solid rgba(191,243,106,.3);background:rgba(15,51,34,.55);color:var(--paper);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);transition:transform .15s ease,background .15s ease,border-color .15s ease;}
  .link:hover,.link:focus-visible{transform:translateY(-2px);background:rgba(15,51,34,.85);border-color:var(--mint);outline:none;}
  .link:focus-visible{box-shadow:0 0 0 3px rgba(90,209,160,.4);}
  .link.primary{background:var(--lime);color:var(--ink);border-color:var(--lime);font-weight:700;box-shadow:0 0 24px rgba(191,243,106,.25);}
  .link.primary:hover,.link.primary:focus-visible{background:#cdf587;border-color:#cdf587;}
  .link .icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .link .icon svg{width:100%;height:100%;}
  .link .label{flex:1;}.link .arrow{opacity:.5;font-size:13px;}
  .handle{margin-top:34px;font-size:13px;letter-spacing:1.5px;color:var(--mint);text-align:center;}
  @media (prefers-reduced-motion:no-preference){.wrap>*{animation:rise .55s cubic-bezier(.2,.7,.3,1) backwards;}.hero{animation-delay:.02s;}.wordmark{animation-delay:.08s;}.tagline{animation-delay:.12s;}.links{animation-delay:.16s;}.handle{animation-delay:.24s;}@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}}
  @media (prefers-reduced-motion:reduce){.spin-cw,.spin-ccw,.spin-cw2,.tracer{animation:none!important;}}
  @media (max-width:380px){.wordmark{font-size:44px;}.hero{width:124px;height:124px;}}
</style>
</head>
<body>
<div class="glow" aria-hidden="true"></div>
<div class="traces" aria-hidden="true"><svg id="tracefield" viewBox="0 0 460 920" preserveAspectRatio="xMidYMid slice"></svg></div>
<span class="corner tl" aria-hidden="true"></span>
<span class="corner br" aria-hidden="true"></span>
<main class="wrap">
  <svg class="hero" viewBox="0 0 240 240" fill="none" aria-label="PhySoc atom mark">
    <!-- orbit 1: horizontal ellipse (mint) -->
    <path id="orbit1" d="M120 153C168.601 153 208 138.225 208 120C208 101.775 168.601 87 120 87C71.3989 87 32 101.775 32 120C32 138.225 71.3989 153 120 153Z" stroke="#5AD1A0" stroke-width="3.4" stroke-linecap="round" opacity="0.9"/>
    <!-- orbit 2: tilted ellipse (leaf) -->
    <path id="orbit2" d="M91.4212 136.5C115.722 178.59 148.216 205.323 164 196.21C179.784 187.098 172.879 145.59 148.579 103.5C124.278 61.4102 91.7837 34.6771 76 43.7898C60.2163 52.9025 67.1206 94.4102 91.4212 136.5Z" stroke="#8BC34A" stroke-width="3.4" stroke-linecap="round" opacity="0.9"/>
    <!-- orbit 3: tilted ellipse other way (forest) -->
    <path id="orbit3" d="M91.4212 103.5C67.1206 145.59 60.2163 187.098 76 196.21C91.7837 205.323 124.278 178.59 148.579 136.5C172.879 94.4102 179.784 52.9025 164 43.7898C148.216 34.6771 115.722 61.4102 91.4212 103.5Z" stroke="#8BC34A" stroke-width="3.4" stroke-linecap="round" opacity="0.9"/>
    <!-- nucleus -->
    <circle cx="120" cy="120" r="14" fill="#BFF36A"/>
    <!-- electrons follow their own orbit path, colour-matched to that ring -->
    <circle r="8" fill="#5AD1A0">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#orbit1"/>
      </animateMotion>
    </circle>
    <circle r="7" fill="#8BC34A">
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
        <mpath href="#orbit2"/>
      </animateMotion>
    </circle>
    <circle r="6.5" fill="#8BC34A">
      <animateMotion dur="7s" repeatCount="indefinite" rotate="auto" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
        <mpath href="#orbit3"/>
      </animateMotion>
    </circle>
  </svg>
  <div class="wordmark"><span class="phy">Phy</span><span class="s">S</span><span class="oc">oc</span><span class="dot">.</span></div>
  <div class="tagline">University of Leeds · Physics Society</div>
  <nav class="links" aria-label="PhySoc links">
    <a class="link primary" href="#REPLACE_membership"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></span><span class="label">Become a member</span><span class="arrow">↗</span></a>
    <a class="link" href="https://instagram.com/physocluu"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></span><span class="label">Instagram&nbsp;&nbsp;@physocluu</span><span class="arrow">↗</span></a>
    <a class="link" href="#REPLACE_tiktok"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg></span><span class="label">TikTok</span><span class="arrow">↗</span></a>
    <a class="link" href="#REPLACE_linkedin"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></span><span class="label">LinkedIn</span><span class="arrow">↗</span></a>
    <a class="link" href="#REPLACE_community"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span><span class="label">Join the group chat</span><span class="arrow">↗</span></a>
    <a class="link" href="mailto:REPLACE@example.com"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span><span class="label">Email the committee</span><span class="arrow">↗</span></a>
  </nav>
  <div class="handle">@physocluu</div>
</main>
<script>
(function(){
  const svg=document.getElementById('tracefield');if(!svg)return;
  const W=460,H=920,ns='http://www.w3.org/2000/svg';
  const colours=['#2E7D32','#1B5E20','#0F3322','#8BC34A','#5AD1A0'];
  function curve(){const y0=Math.random()*H,c1x=80+Math.random()*120,c1y=Math.random()*H,c2x=280+Math.random()*120,c2y=Math.random()*H,y1=Math.random()*H;return `M-40 ${y0.toFixed(0)} C ${c1x.toFixed(0)} ${c1y.toFixed(0)}, ${c2x.toFixed(0)} ${c2y.toFixed(0)}, 500 ${y1.toFixed(0)}`;}
  for(let i=0;i<11;i++){
    const d=curve(),col=colours[i%colours.length];
    const base=document.createElementNS(ns,'path');
    base.setAttribute('d',d);base.setAttribute('class','trace-line');base.setAttribute('stroke',col);
    base.setAttribute('stroke-width',(1+Math.random()*1.5).toFixed(1));
    base.setAttribute('opacity',(0.10+Math.random()*0.12).toFixed(2));
    svg.appendChild(base);
    if(i%2===0){
      const tracer=document.createElementNS(ns,'path');
      tracer.setAttribute('d',d);tracer.setAttribute('class','tracer');
      tracer.setAttribute('stroke','#BFF36A');tracer.setAttribute('stroke-width','3');
      const len=base.getTotalLength();
      tracer.style.strokeDasharray=`3 ${len}`;
      const dur=(10+Math.random()*10).toFixed(1);
      tracer.style.animation=`dash-${i} ${dur}s linear infinite`;
      const style=document.createElementNS(ns,'style');
      style.textContent=`@keyframes dash-${i}{from{stroke-dashoffset:${len};}to{stroke-dashoffset:0;}}`;
      svg.appendChild(style);svg.appendChild(tracer);
    }
  }
})();
</script>
</body>
</html>
