<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhySoc · University of Leeds Physics Society</title>
<meta name="description" content="Physics Society, University of Leeds. Events, socials and how to get involved." />

<!-- Open Graph / social preview -->
<meta property="og:title" content="PhySoc · University of Leeds Physics Society" />
<meta property="og:description" content="Events, socials and how to get involved." />
<meta property="og:type" content="website" />

<!-- Fonts: Space Grotesk (wordmark), Baloo 2 (headline), IBM Plex Mono (labels) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Baloo+2:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --forest: #2E7D32;
    --lime:   #BFF36A;
    --leaf:   #8BC34A;
    --mint:   #5AD1A0;
    --ink:    #07140E;
    --paper:  #FAFAFA;
    --ink-2:  #0F3322; /* the lighter radial wash from the templates */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 64px;
    position: relative;
    overflow-x: hidden;
  }

  /* ---- Ambient background: radial wash + contour curves + Bragg dot lattice ---- */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    -webkit-mask-image: radial-gradient(ellipse 70% 90% at 50% 40%, transparent 35%, #000 80%);
            mask-image: radial-gradient(ellipse 70% 90% at 50% 40%, transparent 35%, #000 80%);
  }
  .bg .wash {
    position: absolute;
    width: 120vmax; height: 120vmax;
    left: 50%; top: -45vmax;
    transform: translateX(-50%);
    background: radial-gradient(circle, var(--ink-2) 0%, transparent 55%);
    opacity: 0.35;
  }
  .bg svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ---- Layout shell ---- */
  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- Corner brackets (signature motif) ---- */
  .bracket {
    position: fixed;
    width: 34px; height: 34px;
    border-color: var(--lime);
    opacity: 0.7;
    z-index: 1;
  }
  .bracket.tl { top: 22px; left: 22px; border-top: 2px solid var(--lime); border-left: 2px solid var(--lime); }
  .bracket.tr { top: 22px; right: 22px; border-top: 2px solid var(--lime); border-right: 2px solid var(--lime); }
  .bracket.bl { bottom: 22px; left: 22px; border-bottom: 2px solid var(--lime); border-left: 2px solid var(--lime); }
  .bracket.br { bottom: 22px; right: 22px; border-bottom: 2px solid var(--lime); border-right: 2px solid var(--lime); }

  /* ---- Header lockup ---- */
  .lockup {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .atom { width: 56px; height: 56px; flex-shrink: 0; }

  .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .wordmark .phy { color: var(--paper); }
  .wordmark .s   { color: var(--lime); }
  .wordmark .oc  { color: var(--leaf); }
  .wordmark .dot { color: var(--mint); }

  .tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--mint);
    margin-bottom: 4px;
    text-align: center;
  }
  .subhead {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: rgba(250,250,250,0.7);
    margin-bottom: 30px;
    text-align: center;
  }

  /* ---- Link buttons ---- */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border: 1.5px solid rgba(139,195,74,0.4);
    background: #0E2418;
    color: var(--paper);
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .link:hover, .link:focus-visible {
    transform: translateY(-2px);
    background: #143524;
    border-color: var(--mint);
    outline: none;
  }
  .link:focus-visible { box-shadow: 0 0 0 3px rgba(90,209,160,0.4); }

  /* Primary CTA — lime fill, ink text */
  .link.primary {
    background: var(--lime);
    color: var(--ink);
    border-color: var(--lime);
    font-weight: 700;
  }
  .link.primary:hover, .link.primary:focus-visible {
    background: var(--leaf);
    border-color: var(--leaf);
  }

  .link .icon {
    width: 22px; height: 22px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .link .icon svg { width: 100%; height: 100%; }
  .link .label { flex: 1; }
  .link .arrow { opacity: 0.5; font-size: 13px; }

  /* ---- Footer ---- */
  .footer {
    margin-top: 36px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(250,250,250,0.4);
    line-height: 1.7;
  }
  .footer .handle { color: var(--mint); }

  /* ---- Page-load fade ---- */
  @media (prefers-reduced-motion: no-preference) {
    .wrap > * { animation: rise 0.5s cubic-bezier(0.2,0.7,0.3,1) backwards; }
    .lockup  { animation-delay: 0.02s; }
    .tagline { animation-delay: 0.06s; }
    .subhead { animation-delay: 0.10s; }
    .links   { animation-delay: 0.14s; }
    .footer  { animation-delay: 0.20s; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  }

  @media (max-width: 380px) {
    .wordmark { font-size: 32px; }
    .atom { width: 48px; height: 48px; }
  }
</style>
</head>
<body>

<!-- Ambient background -->

      <path d="M91.4212 136.5C115.722 178.59 148.216 205.323 164 196.21C179.784 187.098 172.879 145.59 148.579 103.5C124.278 61.4102 91.7837 34.6771 76 43.7898C60.2163 52.9025 67.1206 94.4102 91.4212 136.5Z" stroke="#8BC34A" stroke-width="3.6" stroke-linecap="round"/>
      <path d="M91.4212 103.5C67.1206 145.59 60.2163 187.098 76 196.21C91.7837 205.323 124.278 178.59 148.579 136.5C172.879 94.4102 179.784 52.9025 164 43.7898C148.216 34.6771 115.722 61.4102 91.4212 103.5Z" stroke="#8BC34A" stroke-width="3.6" stroke-linecap="round"/>

  <div class="tagline">University of Leeds</div>

  <!-- ============================================================= -->

  <div class="footer">
    Physics Society · University of Leeds<br />

</main>

<script>
  // Generate the Bragg dot lattice procedurally so the file stays small.
  (function () {
    const g = document.getElementById('lattice');
    if (!g) return;
    const W = 460, H = 900, stepX = 38, stepY = 38, r = 1.6;
    const ns = 'http://www.w3.org/2000/svg';
    let frag = '';
    for (let y = 20; y < H; y += stepY) {
      for (let x = 20; x < W; x += stepX) {
        frag += `<circle cx="${x}" cy="${y}" r="${r}" fill="#8BC34A" opacity="0.05"/>`;
      }
    }
    g.innerHTML = frag;
  })();
</script>

</body>
